# Ravelin CI/CD — build -> test -> containerize (ACR) -> deploy (Container Apps)
#
# Prerequisites (one-time, in Azure DevOps):
#   1. An ARM service connection to your Azure subscription, named to match
#      `azureServiceConnection` below (Project settings -> Service connections ->
#      New -> Azure Resource Manager). Its service principal needs Contributor on
#      the resource group (covers `az acr build` push and `az containerapp update`).
#   2. Fill the variables marked TODO from your Terraform outputs
#      (`terraform output`), ideally via a variable group instead of editing here.
#
# Security scanning (SAST/SCA/secret/image/IaC) is added in Stage 8 — kept out here
# to keep the first pipeline focused on the build-and-deploy loop.

trigger:
  branches:
    include:
      - main

variables:
  azureServiceConnection: 'ravelin-azure'   # ARM service connection name (create in ADO)
  acrName: 'acrravelindevs8066d'            # terraform output acr_name
  acrLoginServer: 'acrravelindevs8066d.azurecr.io'  # terraform output acr_login_server
  resourceGroup: 'rg-ravelin-dev'           # terraform output resource_group_name
  containerAppName: 'ca-ravelin-dev'        # terraform output container_app_name
  imageRepository: 'ravelin'
  tag: '$(Build.BuildId)'
  buildConfiguration: 'Release'
  dotnetSdkVersion: '10.0.x'

stages:
  - stage: Build
    displayName: Build & test
    jobs:
      - job: build_test
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: UseDotNet@2
            displayName: Install .NET SDK
            inputs:
              packageType: sdk
              version: '$(dotnetSdkVersion)'

          - script: dotnet restore Ravelin.slnx
            displayName: Restore

          - script: dotnet build Ravelin.slnx -c $(buildConfiguration) --no-restore --nologo
            displayName: Build

          # Run the fast unit tier here as the deploy gate. The integration tier (Testcontainers
          # SQL) and the E2E tier (Playwright) need Docker/browser setup this agent doesn't have;
          # those tiers run in GitHub Actions (security.yml), which provisions them. Testing the
          # whole solution here would fail on the unprovisioned tiers.
          - script: >
              dotnet test tests/Ravelin.Tests/Ravelin.Tests.csproj -c $(buildConfiguration)
              --no-build --nologo --logger trx --results-directory $(Agent.TempDirectory)/testresults
            displayName: Test (unit tier)

          - task: PublishTestResults@2
            displayName: Publish test results
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: VSTest
              testResultsFiles: '$(Agent.TempDirectory)/testresults/*.trx'
              failTaskOnFailedTests: true

  - stage: Image
    displayName: Build & push image (ACR)
    dependsOn: Build
    # Only build/push an image on a real CI run of `main` — never on a PR validation build
    # (a PR shouldn't push a production image or deploy; PRs just build & unit-test above).
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: build_push
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          # NOTE: Azure for Students blocks ACR Tasks (`az acr build`), and we don't rely
          # on a Docker daemon. Instead we use the .NET SDK's built-in container publish
          # (Microsoft.NET.Build.Containers) to build an OCI image and push it straight to
          # ACR, authenticating with a short-lived token from the service connection.
          - task: UseDotNet@2
            displayName: Install .NET SDK
            inputs:
              packageType: sdk
              version: '$(dotnetSdkVersion)'

          - task: AzureCLI@2
            displayName: Publish container to ACR (no Docker)
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                TOKEN=$(az acr login --name "$(acrName)" --expose-token --query accessToken -o tsv)
                export SDK_CONTAINER_REGISTRY_UNAME="00000000-0000-0000-0000-000000000000"
                export SDK_CONTAINER_REGISTRY_PWORD="$TOKEN"
                dotnet publish src/Ravelin/Ravelin.csproj -c $(buildConfiguration) \
                  -t:PublishContainer --os linux --arch x64 \
                  -p:ContainerRegistry=$(acrLoginServer) \
                  -p:ContainerRepository=$(imageRepository) \
                  '-p:ContainerImageTags="$(tag);latest"' \
                  -p:ContainerBaseImage=mcr.microsoft.com/dotnet/aspnet:10.0-noble-chiseled-extra

  - stage: Deploy
    displayName: Deploy to Container Apps
    dependsOn: Image
    # Deploy only on a real CI run of `main`, never on a PR validation build.
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - deployment: deploy
        pool:
          vmImage: 'ubuntu-latest'
        environment: 'ravelin-dev'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: Update Container App image
                  inputs:
                    azureSubscription: '$(azureServiceConnection)'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      az config set extension.use_dynamic_install=yes_without_prompt
                      az containerapp update \
                        --name "$(containerAppName)" \
                        --resource-group "$(resourceGroup)" \
                        --image "$(acrLoginServer)/$(imageRepository):$(tag)"
                      FQDN=$(az containerapp show --name "$(containerAppName)" \
                        --resource-group "$(resourceGroup)" \
                        --query properties.configuration.ingress.fqdn -o tsv)

                      # Health gate: fail the deploy if the new revision doesn't become ready
                      # (readiness probes the DB). Container Apps keeps the previous revision, so a
                      # failed gate signals a bad deploy instead of silently serving 500s.
                      echo "Probing https://$FQDN/health/ready ..."
                      ok=0
                      for i in $(seq 1 20); do
                        code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "https://$FQDN/health/ready" || echo 000)
                        echo "  attempt $i: HTTP $code"
                        [ "$code" = "200" ] && { ok=1; break; }
                        sleep 15
                      done
                      if [ "$ok" != "1" ]; then
                        echo "##[error]New revision did not become healthy (/health/ready != 200)."
                        exit 1
                      fi
                      echo "Deployed & healthy: https://$FQDN"
